<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Lectura OCR - Azure IA</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom">

        <div class="container-fluid">

            <a class="navbar-brand fw-semibold"
                href="#">

                <i class="bi bi-cpu"></i>
                Azure IA

            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                        <a class="nav-link"
                            href="index.html">

                            Inicio

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active"
                            href="ocr.html">

                            OCR

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <div class="container-fluid">

        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-12 col-md-3 col-lg-2 bg-white border-end min-vh-100 p-3">

                <h5 class="fw-semibold mb-4">

                    Menú

                </h5>

                <div class="list-group list-group-flush">

                    <a href="index.html"
                        class="list-group-item list-group-item-action border-0">

                        <i class="bi bi-house-door me-2"></i>
                        Inicio

                    </a>

                    <a href="ocr.html"
                        class="list-group-item list-group-item-action border-0 active">

                        <i class="bi bi-file-earmark-text me-2"></i>
                        OCR

                    </a>

                </div>

            </aside>

            <!-- MAIN -->
            <main class="col-12 col-md-9 col-lg-10 p-4">

                <!-- HEADER -->
                <div class="mb-5">

                    <h1 class="fw-bold">

                        Lectura OCR con Azure

                    </h1>

                    <p class="text-muted">

                        Extrae texto desde imágenes o documentos utilizando Azure Vision OCR.

                    </p>

                </div>

                <div class="row g-4">

                    <!-- PANEL IZQUIERDO -->
                    <div class="col-12 col-lg-4">

                        <div class="card border-0 shadow-sm h-100">

                            <div class="card-body p-4">

                                <label for="imagenUsuario"
                                    class="form-label fw-semibold">

                                    Seleccione imagen o PDF

                                </label>

                                <input type="file"
                                    id="imagenUsuario"
                                    class="form-control"
                                    accept=".png,.jpg,.jpeg,.pdf">

                                <button id="btnEnviar"
                                    class="btn btn-dark w-100 mt-4">

                                    <i class="bi bi-search me-1"></i>
                                    Leer Texto

                                </button>

                            </div>

                        </div>

                    </div>

                    <!-- PANEL DERECHO -->
                    <div class="col-12 col-lg-8">

                        <div class="card border-0 shadow-sm h-100">

                            <div class="card-body p-4">

                                <h5 class="mb-3">

                                    Texto Detectado

                                </h5>

                                <div id="resultado"
                                    class="bg-light border rounded p-4"
                                    style="
                                        min-height: 450px;
                                        max-height: 650px;
                                        overflow-y: auto;
                                        overflow-x: auto;
                                        line-height: 1.8;
                                        font-size: 16px;
                                        word-break: break-word;
                                        white-space: normal;
                                    ">

                                    <p class="text-muted mb-0">

                                        Esperando archivo...

                                    </p>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <!-- FOOTER -->
    <footer class="bg-white border-top py-3">

        <div class="container-fluid text-center text-muted">

            © 2026 Azure IA

        </div>

    </footer>

    <!-- JS -->
    <script src="./js/ocr.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
