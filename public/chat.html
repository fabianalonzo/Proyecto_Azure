<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chat IA - Azure IA</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        .chat-box {
            height: 65vh;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
        }

        .mensaje-usuario {
            background: #212529;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            width: fit-content;
            max-width: 80%;
            margin-left: auto;
        }

        .mensaje-ia {
            background: white;
            border: 1px solid #dee2e6;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            width: fit-content;
            max-width: 80%;
        }

    </style>

</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom">

        <div class="container-fluid">

            <a class="navbar-brand fw-semibold" href="#">
                <i class="bi bi-cpu"></i>
                Azure IA
            </a>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <div class="container-fluid">

        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-12 col-md-3 col-lg-2 bg-white border-end min-vh-100 p-3">

                <h5 class="fw-semibold mb-4">
                    Menú
                </h5>

                <div class="list-group list-group-flush">

                    <a href="index.html"
                        class="list-group-item list-group-item-action border-0">

                        <i class="bi bi-house-door me-2"></i>
                        Inicio

                    </a>

                    <a href="sentimientos.html"
                        class="list-group-item list-group-item-action border-0">

                        <i class="bi bi-chat-square-text me-2"></i>
                        Sentimientos

                    </a>

                    <a href="imagen.html"
                        class="list-group-item list-group-item-action border-0">

                        <i class="bi bi-image me-2"></i>
                        Imagen

                    </a>

                    <a href="extraccion.html"
                        class="list-group-item list-group-item-action border-0">

                        <i class="bi bi-file-earmark-text me-2"></i>
                        Extracción

                    </a>

                    <a href="modelo.html"
                        class="list-group-item list-group-item-action border-0">

                        <i class="bi bi-robot me-2"></i>
                        Modelo IA

                    </a>

                    <a href="chat.html"
                        class="list-group-item list-group-item-action border-0 active">

                        <i class="bi bi-chat-dots me-2"></i>
                        Chat IA

                    </a>

                </div>

            </aside>

            <!-- MAIN -->
            <main class="col-12 col-md-9 col-lg-10 p-4 d-flex flex-column">

                <!-- HEADER -->
                <div class="mb-4">

                    <h1 class="fw-bold">
                        Chat con IA
                    </h1>

                    <p class="text-muted">
                        Conversa con Azure OpenAI en tiempo real.
                    </p>

                </div>

                <!-- CHAT -->
                <div class="card border-0 shadow-sm flex-grow-1 d-flex flex-column">

                    <div class="card-body d-flex flex-column">

                        <!-- MENSAJES -->
                        <div id="resultado"
                            class="chat-box flex-grow-1 mb-3">

                            <div class="mensaje-ia">
                                Hola, ¿en qué puedo ayudarte?
                            </div>

                        </div>

                        <!-- INPUT -->
                        <div class="d-flex gap-2">

                            <textarea id="preguntaUsuario"
                                class="form-control"
                                rows="2"
                                placeholder="Escribe tu mensaje..."></textarea>

                            <button id="btnEnviar"
                                class="btn btn-dark px-4">

                                <i class="bi bi-send"></i>

                            </button>

                        </div>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <script src="./js/chatHistorial.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
